<VirtualHost *:8080>
    ServerName bridge.dev.intdata.pro
    ServerAlias www.bridge.dev.intdata.pro

    DocumentRoot /var/www/bridge.dev.intdata.pro
    <Directory /var/www/bridge.dev.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://bridge.dev.intdata.pro%{REQUEST_URI} [R=301,L]
RewriteCond %{SERVER_NAME} =www.bridge.dev.intdata.pro [OR]
RewriteCond %{SERVER_NAME} =bridge.dev.intdata.pro
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName bridge.dev.intdata.pro
    ServerAlias www.bridge.dev.intdata.pro

    SSLEngine on
    # Сертификат выдан certbot (Let's Encrypt) 2025-09-27, автопродление включено.
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass / http://127.0.0.1:8081/ timeout=60
    ProxyPassReverse / http://127.0.0.1:8081/

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/bridge.dev.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/bridge.dev.intdata.pro.access.log combined
    SSLCertificateFile /etc/letsencrypt/live/bridge.dev.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bridge.dev.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>
