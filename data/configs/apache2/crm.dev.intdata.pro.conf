<VirtualHost *:8080>
    ServerName crm.dev.intdata.pro
    ServerAlias www.crm.dev.intdata.pro

    DocumentRoot /var/www/crm.dev.intdata.pro
    <Directory /var/www/crm.dev.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://crm.dev.intdata.pro%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName crm.dev.intdata.pro
    ServerAlias www.crm.dev.intdata.pro

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.crm\.dev\.intdata\.pro$ [NC]
    RewriteRule ^/(.*)$ https://crm.dev.intdata.pro/$1 [R=308,L]

    SSLEngine on
    # Сертификат выдан certbot (Let's Encrypt) 2025-10-03, автопродление включено.
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass /healthz http://127.0.0.1:9102/ retry=0
    ProxyPassReverse /healthz http://127.0.0.1:9102/
    ProxyPass / http://127.0.0.1:9102/ timeout=60
    ProxyPassReverse / http://127.0.0.1:9102/
    ProxyPassReverse / https://crm.dev.intdata.pro/

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header edit Location "^http://crm\\.dev\\.intdata\\.pro/(.*)$" "https://crm.dev.intdata.pro/$1"

    ErrorLog ${APACHE_LOG_DIR}/crm.dev.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/crm.dev.intdata.pro.access.log combined
    SSLCertificateFile /etc/letsencrypt/live/crm.dev.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/crm.dev.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>
