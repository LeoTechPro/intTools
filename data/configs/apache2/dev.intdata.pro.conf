<VirtualHost *:8080>
    ServerName dev.intdata.pro
    ServerAlias www.dev.intdata.pro

    DocumentRoot /var/www/dev.intdata.pro
    <Directory /var/www/dev.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://dev.intdata.pro%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName dev.intdata.pro
    ServerAlias www.dev.intdata.pro

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\.dev\.intdata\.pro$ [NC]
    RewriteRule ^/(.*)$ https://dev.intdata.pro/$1 [R=308,L]

    SSLEngine on
    # Сертификат выдан certbot (Let's Encrypt) 2025-09-27, автопродление включено.
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass / http://127.0.0.1:5801/ timeout=60
    ProxyPassReverse / http://127.0.0.1:5801/
    ProxyPass /ws/ ws://127.0.0.1:5801/ws/
    ProxyPassReverse /ws/ ws://127.0.0.1:5801/ws/

    # Минимальные заголовки, без жёстких ограничений
    Header        always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/dev.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/dev.intdata.pro.access.log combined
    SSLCertificateFile /etc/letsencrypt/live/dev.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/dev.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>
