# IntData Identity API (dev)

<VirtualHost *:8080>
    ServerName id.dev.intdata.pro
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/id.dev.intdata.pro-error.log
    CustomLog ${APACHE_LOG_DIR}/id.dev.intdata.pro-access.log combined
</VirtualHost>

<VirtualHost *:8443>
    ServerName id.dev.intdata.pro

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/id.dev.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/id.dev.intdata.pro/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/(api|admin|healthz|readyz|1\.0)(/.*)?$ [NC]
    RewriteCond %{REQUEST_URI} !^/favicon\.ico$
    RewriteRule ^/(.*)$ /admin/$1 [R=307,L]

    ProxyPass        /api/v1              http://127.0.0.1:15810/api/v1 retry=0
    ProxyPassReverse /api/v1              http://127.0.0.1:15810/api/v1

    ProxyPass        /api/docs            http://127.0.0.1:15810/api/docs retry=0
    ProxyPassReverse /api/docs            http://127.0.0.1:15810/api/docs
    ProxyPass        /api/v1/openapi.json http://127.0.0.1:15810/api/v1/openapi.json retry=0
    ProxyPassReverse /api/v1/openapi.json http://127.0.0.1:15810/api/v1/openapi.json

    ProxyPass        /healthz             http://127.0.0.1:15810/healthz retry=0
    ProxyPassReverse /healthz             http://127.0.0.1:15810/healthz
    ProxyPass        /readyz              http://127.0.0.1:15810/healthz retry=0
    ProxyPassReverse /readyz              http://127.0.0.1:15810/healthz
    ProxyPass        /1.0/                http://127.0.0.1:8081/1.0/ retry=0 timeout=60
    ProxyPassReverse /1.0/                http://127.0.0.1:8081/1.0/

    ProxyPass        /admin/              http://127.0.0.1:15820/admin/ retry=0 timeout=60
    ProxyPassReverse /admin/              http://127.0.0.1:15820/admin/

    <Location />
        Require all denied
    </Location>

    <Location /api/>
        Require all granted
    </Location>

    <LocationMatch "^/(users|assets|packs)(/|$)">
        Require all granted
    </LocationMatch>

    <Location /admin/>
        Require all granted
    </Location>

    <LocationMatch "^/(healthz|readyz)$">
        Require all granted
    </LocationMatch>

    <Proxy http://127.0.0.1:15820/admin/>
        Require all granted
    </Proxy>

    ErrorLog ${APACHE_LOG_DIR}/id.dev.intdata.pro-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/id.dev.intdata.pro-ssl-access.log combined
</VirtualHost>
