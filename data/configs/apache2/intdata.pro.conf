<VirtualHost *:8080>
    ServerName intdata.pro
    ServerAlias www.intdata.pro

    # Отдаём ACME-челленджи как есть
    DocumentRoot /var/www/intdata.pro
    <Directory /var/www/intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    RewriteEngine On
    # Не редиректим сам вызов проверки сертификата
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
RewriteCond %{SERVER_NAME} =www.intdata.pro [OR]
RewriteCond %{SERVER_NAME} =intdata.pro [OR]
RewriteCond %{SERVER_NAME} =bot.intdata.pro
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName intdata.pro
    ServerAlias www.intdata.pro

    # --- SSL (оставьте строки, которые добавил certbot) ---
    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf

    # --- Reverse Proxy to Uvicorn ---
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    # Основной HTTP-прокси
    ProxyPass / http://127.0.0.1:5800/ timeout=60
    ProxyPassReverse / http://127.0.0.1:5800/

    # (опц.) Если у приложения есть WebSocket-эндпоинты:
    ProxyPass        /ws/ ws://127.0.0.1:5800/ws/
    ProxyPassReverse /ws/ ws://127.0.0.1:5800/ws/

    # Базовая защита заголовками
    Header        always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    # Включите HSTS после проверки, чтобы не «запереть» себя:
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    ErrorLog ${APACHE_LOG_DIR}/intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/intdata.pro.access.log combined
    ServerAlias  bot.intdata.pro
    ServerAlias www.bot.intdata.pro
SSLCertificateFile /etc/letsencrypt/live/intdata.pro/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/intdata.pro/privkey.pem
</VirtualHost>
</IfModule>
