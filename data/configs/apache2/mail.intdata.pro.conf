# Mailpit UI (proxy via Apache on 8080 → nginx front → docker Mailpit)

<VirtualHost *:8080>
    ServerName mail.intdata.pro

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass /.well-known/acme-challenge/ !
    Alias /.well-known/acme-challenge/ "/var/www/letsencrypt/.well-known/acme-challenge/"

    ProxyPass        / http://127.0.0.1:8025/ retry=0 timeout=30
    ProxyPassReverse / http://127.0.0.1:8025/

    ErrorLog  /var/log/apache2/mail.intdata.pro-error.log
    CustomLog /var/log/apache2/mail.intdata.pro-access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =mail.intdata.pro
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<Directory "/var/www/letsencrypt/.well-known/acme-challenge/">
    Require all granted
</Directory>
