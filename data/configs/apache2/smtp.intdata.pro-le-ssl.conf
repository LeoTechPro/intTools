<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName smtp.intdata.pro

    DocumentRoot /var/www/smtp.intdata.pro
    <Directory /var/www/smtp.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    Alias /.well-known/acme-challenge/ "/var/www/letsencrypt/.well-known/acme-challenge/"
    <Directory "/var/www/letsencrypt/.well-known/acme-challenge/">
        Require all granted
    </Directory>

Include /etc/letsencrypt/options-ssl-apache.conf
SSLEngine on
SSLCertificateFile /etc/letsencrypt/live/mail.intdata.pro-0001/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/mail.intdata.pro-0001/privkey.pem

    ErrorLog  /var/log/apache2/smtp.intdata.pro-error.log
    CustomLog /var/log/apache2/smtp.intdata.pro-access.log combined
</VirtualHost>
</IfModule>
