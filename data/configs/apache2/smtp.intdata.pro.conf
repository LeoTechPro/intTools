# SMTP host informational page (Apache on 8080 → nginx)

<VirtualHost *:8080>
    ServerName smtp.intdata.pro

    DocumentRoot /var/www/smtp.intdata.pro
    <Directory /var/www/smtp.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    Alias /.well-known/acme-challenge/ "/var/www/letsencrypt/.well-known/acme-challenge/"
    <Directory "/var/www/letsencrypt/.well-known/acme-challenge/">
        Require all granted
    </Directory>

    ErrorLog  /var/log/apache2/smtp.intdata.pro-error.log
    CustomLog /var/log/apache2/smtp.intdata.pro-access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =smtp.intdata.pro
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
