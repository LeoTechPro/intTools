<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName sso.intdata.pro

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    ProxyPass /.well-known/acme-challenge/ !
    Alias /.well-known/acme-challenge/ "/var/www/sso.intdata.pro/.well-known/acme-challenge/"

    ProxyPass        / http://127.0.0.1:28080/ retry=0 timeout=30
    ProxyPassReverse / http://127.0.0.1:28080/

    ErrorLog  /var/log/apache2/sso.intdata.pro-error.log
    CustomLog /var/log/apache2/sso.intdata.pro-access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/sso.intdata.pro/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/sso.intdata.pro/privkey.pem
</VirtualHost>
</IfModule>
