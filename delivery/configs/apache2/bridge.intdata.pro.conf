<VirtualHost *:8080>
    ServerName bridge.intdata.pro
    ServerAlias www.bridge.intdata.pro

    DocumentRoot /var/www/bridge.intdata.pro
    <Directory /var/www/bridge.intdata.pro>
        Require all granted
        Options -Indexes
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://bridge.intdata.pro%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName bridge.intdata.pro
    ServerAlias www.bridge.intdata.pro

    SSLEngine On
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/bridge.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/bridge.intdata.pro/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass / http://127.0.0.1:18090/ timeout=60
    ProxyPassReverse / http://127.0.0.1:18090/

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/bridge.intdata.pro.error.log
    CustomLog ${APACHE_LOG_DIR}/bridge.intdata.pro.access.log combined
</VirtualHost>
</IfModule>
