<VirtualHost *:8080>
    ServerName kaui.intdata.pro

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^ https://kaui.intdata.pro%{REQUEST_URI} [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName kaui.intdata.pro

    SSLEngine on
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/kaui.intdata.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/kaui.intdata.pro/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    ProxyPass / http://127.0.0.1:29091/ timeout=60
    ProxyPassReverse / http://127.0.0.1:29091/
    ProxyPassReverseCookieDomain 127.0.0.1 kaui.intdata.pro
    ProxyPassReverseCookiePath / /

    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    <Location />
        Require all granted
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/kaui.intdata.pro-error.log
    CustomLog ${APACHE_LOG_DIR}/kaui.intdata.pro-access.log combined
</VirtualHost>
</IfModule>
