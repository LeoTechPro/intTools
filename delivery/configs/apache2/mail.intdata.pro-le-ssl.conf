<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName mail.intdata.pro

    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"

    ProxyPass /.well-known/acme-challenge/ !
    Alias /.well-known/acme-challenge/ "/var/www/letsencrypt/.well-known/acme-challenge/"

    SSLProxyEngine On
    SSLProxyVerify none
    SSLProxyCheckPeerCN Off
    SSLProxyCheckPeerName Off

    ProxyPass        / https://127.0.0.1:8025/ retry=0 timeout=30
    ProxyPassReverse / https://127.0.0.1:8025/

    ErrorLog  /var/log/apache2/mail.intdata.pro-error.log
    CustomLog /var/log/apache2/mail.intdata.pro-access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/mail.intdata.pro-0001/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/mail.intdata.pro-0001/privkey.pem
</VirtualHost>
</IfModule>

<Directory "/var/www/letsencrypt/.well-known/acme-challenge/">
    Require all granted
</Directory>
