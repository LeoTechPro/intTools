<IfModule mod_ssl.c>
<VirtualHost *:8443>
    ServerName pga.intdata.pro

    ErrorLog ${APACHE_LOG_DIR}/pga_intdata_error.log
    CustomLog ${APACHE_LOG_DIR}/pga_intdata_access.log combined

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/pgadmin4
    RewriteRule ^/(.*)$ /pgadmin4/$1 [PT,L]

SSLCertificateFile /etc/letsencrypt/live/pga.intdata.pro/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/pga.intdata.pro/privkey.pem
Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
