server {
    listen 80;
    listen [::]:80;
    server_name tools.intdata.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name tools.intdata.pro;

    access_log /var/log/nginx/tools.intdata.pro.access.log main;
    error_log  /var/log/nginx/tools.intdata.pro.error.log warn;

    root /int/tools/web;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|ico|svg|png|jpg|jpeg|webp)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    ssl_certificate /etc/letsencrypt/live/tools.intdata.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tools.intdata.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
