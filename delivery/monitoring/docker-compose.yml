  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U zabbix -d zabbix"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #   environment: # Username, password and database name variables
  #     POSTGRES_USER: zabbix
