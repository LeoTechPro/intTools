policy_version: gates.v1

role_aliases:
  system:
    kind: machine
  dba-role:
    kind: human
  teamlead-role:
    kind: human
  owner:
    kind: human

scope_rules:
  - kind: migration
    patterns:
      - "backend/init/migrations/**"
      - "backend/init/migration_manifest.lock"
  - kind: process-contract
    patterns:
      - "package.json"
      - "README.md"
      - "AGENTS.md"
      - "GEMINI.md"
      - ".gitignore"
      - "openspec/**"
  - kind: backend-runtime
    patterns:
      - "backend/**"
  - kind: web-ui
    patterns:
      - "web/**"
  - kind: docs-boundary
    patterns:
      - "docs/**"
  - kind: major-change
    patterns:
      - "openspec/**"
  - kind: release-main
    patterns:
      - "docs/release.md"

stages:
  commit:
    always:
      - lock-scope
      - docs-boundary
    by_kind:
      backend-runtime:
        - autoreview
      web-ui:
        - autoreview
      docs-boundary:
        - autoreview
      process-contract:
        - docs-sync
        - autoreview
      migration:
        - migration-layout-check
        - migration-consistency-check
        - dba-review-1
        - dba-review-2
        - teamlead-approval
        - apply-window-approved
      major-change:
        - autoreview
        - teamlead-orchestration
        - specialist-opinions-complete
  push:
    always:
      - issue-open
  migration-apply:
    always:
      - issue-open
    by_kind:
      migration:
        - migration-layout-check
        - migration-consistency-check
        - dba-review-1
        - dba-review-2
        - teamlead-approval
        - apply-window-approved
  release-main:
    always:
      - owner-main-approval
      - dev-ancestor-check
      - release-issue-acceptance

gate_definitions:
  lock-scope:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  docs-boundary:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  docs-sync:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  autoreview:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  migration-layout-check:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  migration-consistency-check:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  dba-review-1:
    kind: human
    role_required:
      - dba-role
    stale_on_fingerprint_change: true
    allow_waive: false
  dba-review-2:
    kind: human
    role_required:
      - dba-role
    stale_on_fingerprint_change: true
    allow_waive: false
  teamlead-approval:
    kind: human
    role_required:
      - teamlead-role
    stale_on_fingerprint_change: true
    allow_waive: false
  apply-window-approved:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  teamlead-orchestration:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  specialist-opinions-complete:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: true
    allow_waive: false
  issue-open:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: false
    allow_waive: false
  owner-main-approval:
    kind: human
    role_required:
      - owner
    stale_on_fingerprint_change: true
    allow_waive: false
  dev-ancestor-check:
    kind: auto
    role_required:
      - system
    stale_on_fingerprint_change: false
    allow_waive: false
  release-issue-acceptance:
    kind: human
    role_required:
      - teamlead-role
    stale_on_fingerprint_change: true
    allow_waive: false

evidence_extractors:
  docs-sync:
    source: "ops/gates/docs_sync_gate.sh"
  autoreview:
    source: "ops/gates/autoreview_gate.sh"
  dba-review:
    source: "ops/db/dba_review_gate.sh"
  teamlead:
    source: "ops/teamlead/teamlead_orchestrator.sh"
